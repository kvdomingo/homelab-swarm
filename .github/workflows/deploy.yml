name: Deploy

on:
  push:
    branches: [main]
    paths:
      - github/**
      - docker-compose.yml

concurrency:
  group: dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: dev
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - name: Deploy stack
        run: docker stack deploy --compose-file docker-compose.yml swarm-cd --prune --detach
